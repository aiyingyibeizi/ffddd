<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta name="robots" content="noindex, nofollow">
    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key == 'F12' || (e.ctrlKey && e.key == 'u') || (e.ctrlKey && e.shiftKey && e.key == 'I')) e.preventDefault();
        });
    </script>

    <meta charset="UTF-8">
    <title>反应时间测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            padding: 30px 20px;
            background: #f0f0f0;
            overflow-y: auto;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        #testBox {
            width: 100%;
            height: 360px;
            background: #b71c1c;
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            color: #fff;
            cursor: pointer;
            text-align: center;
            padding: 20px;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
            line-height: 1.6;
        }

        .btn-group {
            margin-top: 25px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 10px 26px;
            border: none;
            border-radius: 8px;
            background: #222;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }

        .btn:hover {
            background: #444;
        }
    </style>
</head>

<body>
    <div class="container">
        <div id="testBox">点击开始</div>
        <div class="result" id="result"></div>
        <div class="btn-group">
            <button class="btn" onclick="restartTest()">再来一次</button>
            <button class="btn" onclick="backHome()">返回主界面</button>
        </div>
    </div>

    <script>
        let state = 0;
        let startTime = 0;
        let timer = null;
        const box = document.getElementById('testBox');
        const resDom = document.getElementById('result');

        const totalRound = 5;
        let currentRound = 0;
        let timeList = [];

        function resetAll() {
            if (timer) clearTimeout(timer);
            timer = null;
            state = 0;
            box.style.background = '#b71c1c';
        }

        function initRound() {
            resetAll();
            box.innerText = `第${currentRound + 1}/${totalRound}轮\n点击开始`;
            resDom.innerText = "";
        }

        function restartTest() {
            currentRound = 0;
            timeList = [];
            initRound();
        }

        function backHome() {
            window.location.href = "index.html";
        }

        function showFinalResult() {
            let html = "";
            let sum = 0;
            for (let i = 0; i < totalRound; i++) {
                html += `第${i + 1}轮反应：${timeList[i]} ms<br>`;
                sum += parseFloat(timeList[i]);
            }
            let avg = (sum / totalRound).toFixed(2);
            html += `<br>平均反应时间：${avg} ms`;
            resDom.innerHTML = html;
        }

        box.onclick = function () {
            if (state === 0) {
                box.innerText = `第${currentRound + 1}/${totalRound}轮\n等待变绿...不要提前点击`;
                state = 1;
                let wait = Math.floor(Math.random() * (5000 - 2000 + 1)) + 2000;
                timer = setTimeout(() => {
                    box.style.background = '#2e7d32';
                    box.innerText = "立刻点击！";
                    startTime = performance.now();
                    state = 2;
                }, wait);
            }
            else if (state === 1) {
                resetAll();
                box.innerText = "提前点击！违规";
                setTimeout(() => {
                    currentRound++;
                    if (currentRound >= totalRound) {
                        showFinalResult();
                    } else {
                        initRound();
                    }
                }, 1200);
            }
            else if (state === 2) {
                let raw = performance.now() - startTime;
                let final = raw - 80;
                if (final < 0) final = 0;
                let t = final.toFixed(2);
                timeList.push(t);

                box.innerText = t + " ms";
                box.style.background = '#1976D2';
                state = 0;

                setTimeout(() => {
                    currentRound++;
                    if (currentRound >= totalRound) {
                        showFinalResult();
                    } else {
                        initRound();
                    }
                }, 1200);
            }
        };

        initRound();
    </script>
</body>

</html>
